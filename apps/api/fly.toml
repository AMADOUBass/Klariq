# fly.toml app configuration file generated for klariq on 2026-05-01T19:10:03Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'klariq'
primary_region = 'yyz'

[build]
  dockerfile = '../../Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '4000'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
